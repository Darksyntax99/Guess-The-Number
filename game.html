    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">

<!-- Navigation Bar -->
 <nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">Guess the Number Game</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">

          <a class="nav-link active" aria-current="page" href="index.html">Home</a>

        </li>

  </div>
</nav>

<div class="container text-center mt-5">

  <h1 class="game-title">Guess The Number</h1>
  <p class="game-subtitle">Choose a number between 1 and 100</p>

  <div class="card game-card mx-auto mt-4">

    <div class="card-body">

      <input type="number" class="form-control mb-3" id="guessInput" placeholder="Enter your guess">

      <button id="checkBtn" class="btn btn-secondary me-2">Check</button>
      <button id="resetBtn" class="btn btn-outline-light">Reset</button>

      <p class="result mt-3">Start guessing...</p>
      <p class="attempts">Attempts: 0</p>

    </div>

  </div>

</div>

<!--footer-->
<footer class="bg-dark text-light text-center py-3 mt-auto">
  <p class="mb-1"> 2026 Guess the Number Game.</p>
  <p class="mb-0">Have fun guessing the number! 🎯</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
